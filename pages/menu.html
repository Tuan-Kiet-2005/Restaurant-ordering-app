<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Hải Sản</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- Header -->

        <header class="header">

            <div class="logo">

                <h1>
                    <span class="logo-1">
                        Tuan Kiet
                    </span>

                    Restaurant
                </h1>

                <p class="slogan">
                    Món nào cũng ngon !!!
                </p>

            </div>

        </header>

        <!-- Main -->

        <main class="menu-page">

            <!-- Back -->

            <a href="../index.html" class="back-btn">
                ← Đổi bàn
            </a>

            <!-- Welcome -->

            <div class="welcome">

                <h2 class="table-title"></h2>

                <p>
                    Hôm nay bạn muốn ăn gì?
                </p>

            </div>

            <!-- Search -->

            <div class="search-box">

                <input
                    type="text"
                    placeholder="Tìm món ăn..."
                >

            </div>

            <!-- Category -->

            <div class="category-container">

                <button class="category-btn active">
                    Tất cả
                </button>

                <button class="category-btn">
                    Cá
                </button>

                <button class="category-btn">
                    Cua Ghẹ
                </button>

                <button class="category-btn">
                    Ốc
                </button>

                <button class="category-btn">
                    Lẩu
                </button>

                <button class="category-btn">
                    Nước uống
                </button>

            </div>

            <!-- Best seller -->

            <h3 class="menu-title">
                🔥 Best Seller
            </h3>

            <!-- Menu list -->

            <div class="menu-list">

                <!-- Item -->

                <div class="food-card">

                    <div class="food-image"></div>

                    <h4>
                        Cua rang me
                    </h4>

                    <p>
                        450.000đ
                    </p>

                    <button>
                        Thêm
                    </button>

                </div>

                <!-- Item -->

                <div class="food-card">

                    <div class="food-image"></div>

                    <h4>
                        Tôm hùm nướng
                    </h4>

                    <p>
                        650.000đ
                    </p>

                    <button>
                        Thêm
                    </button>

                </div>

                <!-- Item -->

                <div class="food-card">

                    <div class="food-image"></div>

                    <h4>
                        Cá mú hấp
                    </h4>

                    <p>
                        320.000đ
                    </p>

                    <button>
                        Thêm
                    </button>

                </div>

                <!-- Item -->

                <div class="food-card">

                    <div class="food-image"></div>

                    <h4>
                        Ốc hương xào bơ
                    </h4>

                    <p>
                        180.000đ
                    </p>

                    <button>
                        Thêm
                    </button>

                </div>

            </div>

        </main>

    </div>
<script src="../js/menu.js"></script>
</body>
</html>
